name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      new_version: ${{ steps.tag.outputs.new_version }}
      changelog: ${{ steps.tag.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

  publish:
    runs-on: ubuntu-latest
    needs: tag
    if: needs.tag.outputs.new_tag

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Set version from tag
        run: |
          VERSION="${{ needs.tag.outputs.new_version }}"
          poetry version "$VERSION"
          sed -i "s/__version__ = \"0.0.0\"/__version__ = \"$VERSION\"/" src/pyacli/__init__.py

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest tests/ -v

      - name: Build package
        run: poetry build

      - name: Publish to PyPI
        run: poetry publish --username __token__ --password ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.tag.outputs.new_tag }}" dist/* \
            --title "${{ needs.tag.outputs.new_tag }}" \
            --notes "${{ needs.tag.outputs.changelog }}"

  docker:
    runs-on: ubuntu-latest
    needs: [tag, publish]
    if: needs.tag.outputs.new_tag

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pyacli:${{ needs.tag.outputs.new_version }}
            ghcr.io/${{ github.repository_owner }}/pyacli:latest
